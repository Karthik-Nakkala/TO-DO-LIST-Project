<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful, industry-standard To-Do List application." />
  <title>TaskFlow — To-Do List</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app" role="main" aria-label="TaskFlow To-Do Application">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">TaskFlow</h1>
        <p class="app-subtitle">Stay focused. Get things done.</p>
      </div>
      <div class="task-pill" id="taskPill" aria-live="polite">
        <span class="dot"></span>
        <span id="pillCount">0 tasks</span>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-wrap" aria-label="Task progress">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progressLabel">0 of 0 done</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input
        type="text"
        id="task"
        placeholder="Add a new task…"
        autocomplete="off"
        aria-label="New task input"
        maxlength="120"
      />
      <button id="taskSubmit" aria-label="Add task">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Task
      </button>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
      <button class="filter-tab active" role="tab" data-filter="all"   aria-selected="true">All</button>
      <button class="filter-tab"        role="tab" data-filter="active" aria-selected="false">Active</button>
      <button class="filter-tab"        role="tab" data-filter="done"   aria-selected="false">Done</button>
    </div>

    <!-- Task List -->
    <ul id="to-do-list" aria-label="Task list" aria-live="polite"></ul>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" aria-live="polite">
      <div class="empty-icon">✦</div>
      <p>No tasks here</p>
      <span>Add something above to get started</span>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <p class="footer-count"><span id="remainCount">0</span> remaining</p>
      <button class="clear-btn" id="clearDone" aria-label="Clear completed tasks">Clear done</button>
    </footer>

  </div>

  <script src="toDo.js"></script>
</body>
</html>
